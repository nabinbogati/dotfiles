# editor
if [[ -n $SSH_CONNECTION ]]; then
    export EDITOR='nvim'
else
    export EDITOR='nvim'
fi


# alias
alias pbcopy="xclip -sel clip"
alias open="nautilus . & disown"
alias vconfig="vim ~/dotfiles/init.vim"
alias zconfig="vim ~/dotfiles/.zshrc"
alias tconfig="vim ~/dotfiles/.tmux.conf"
alias bconfig="vim ~/dotfiles/.bashrc"
alias ls="colorls $*"
alias vim="nvim"

alias rsync="sh ~/dotfiles/rsync.sh"
alias rbackup="sh ~/dotfiles/rbackup.sh"

# python virtualenv settings 
export PATH=$HOME/.local/bin:$PATH
export WORKON_HOME=$HOME/.virtualenvs
export VIRTUALENVWRAPPER_PYTHON=/usr/bin/python3
source $HOME/.local/bin/virtualenvwrapper.sh

# go path, nvm, node
export PATH=$PATH:/usr/local/go/bin
export PATH=$HOME/.nvm/versions/node/v14.8.0/bin/:$PATH

# tmux fix for virtualenv
if [ -n "$VIRTUAL_ENV" ]; then
     source $VIRTUAL_ENV/bin/activate;
fi

# starship prompt in shell
export STARSHIP_CONFIG=~/.starship.toml

if [ ! $0 = bash ]; then
    eval "$(starship init /usr/bin/zsh)";
else
    eval "$(starship init $0)";
fi

