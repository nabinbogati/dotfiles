# Configuration for Alacritty, the GPU enhanced terminal emulator.

env:
    TERM: xterm-256color 


# Window Customization Start
window:
    dimensions:
        columns: 140
        lines: 38
    padding:
        x: 3
        y: 3
    decorations: none
    window.dynamic_title: true


# History and Scrolling Start
scrolling:
  history: 10000
  multiplier: 3


# Background Transparency Start
background_opacity: 1


#:Font Configuration Start
font:
  normal:
    family: FantasqueSansMono Nerd Font 
    style: Regular
  size: 15.0


# (Gruvbox High Dark)
colors:
  primary:
    background: '#1d2021'
    foreground: '#ebdbb2'

  normal:
    black:   '#3c3836'
    red:     '#cc241d'
    green:   '#98971a'
    yellow:  '#d79921'
    blue:    '#458588'
    magenta: '#b16286'
    cyan:    '#689d6a'
    white:   '#a89984'

  bright:
    black:   '#928374'
    red:     '#fb4934'
    green:   '#b8bb26'
    yellow:  '#458588'
    blue:    '#83a598'
    magenta: '#d3869b'
    cyan:    '#8ec07c'
    white:   '#ebdbb2'
