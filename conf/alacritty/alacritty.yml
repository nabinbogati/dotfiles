# Configuration for Alacritty, the GPU enhanced terminal emulator.

env:
  TERM: xterm-256color # Window Customization
window:
  dimensions:
    columns: 140
    lines: 38
  padding:
    x: 3
    y: 3
  decorations: none

scrolling:
  history: 10000
  multiplier: 3

background_opacity: 1

# Window title
window.dynamic_title: true


#:Font configuration
font:
  # Normal (roman) font face
  normal:
    family: FantasqueSansMono Nerd Font 
    style: Regular

  # Point size
  size: 15.0


# Colors (Solarized Dark)
colors:
  # Default colors
  primary:
    background: '#002b36' # base03
    foreground: '#839496' # base0

  # Cursor colors
  cursor:
    text:   '#002b36' # base03
    cursor: '#839496' # base0

  # Normal colors
  normal:
    black:   '#073642' # base02
    red:     '#dc322f' # red
    green:   '#859900' # green
    yellow:  '#b58900' # yellow
    blue:    '#268bd2' # blue
    magenta: '#d33682' # magenta
    cyan:    '#2aa198' # cyan
    white:   '#eee8d5' # base2
