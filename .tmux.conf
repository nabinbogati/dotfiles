# fix terminal colours and tell Tmux that outside terminal supports true colour
set -g default-terminal "screen-256color"

# Plugin Start (Prefix+I or Prefix+U)
set -g @plugin 'tmux-plugins/tpm'             # tmux plugin manager
set -g @plugin 'jimeh/tmux-themepack'         # show windows name in middle of statusline
# Plugin End

# status bar at top, numbering windows from 1 instead of 0, automatic window title
set-option -g status-position top
set -g base-index 1
set -g automatic-rename on
set -g @themepack 'powerline/block/cyan'

# change Tmux prefix from C-b to C-a
unbind C-b
set -g prefix C-a

# resize pane
bind-key -r M-l resize-pane -L 5
bind-key -r M-j resize-pane -D 5
bind-key -r M-k resize-pane -U 5
bind-key -r M-h resize-pane -R 5

# change pane
bind-key -r l select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r h select-pane -R

# initialize tpm
run -b '~/.tmux/plugins/tpm/tpm'

