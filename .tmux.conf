# List of plugins

# Set default term to xterm
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g @plugin 'tmux-plugins/tpm'	   	# tmux package manager Prefix+I or Prefix+U	
set -g @plugin 'tmux-plugins/tmux-sensible'	# default tmux settings
set -g @plugin 'tmux-plugins/tmux-yank'    	# copying contents inside tmux
set -g @plugin 'tmux-plugins/tmux-copycat' 	# regex search highlighting
set -g @continuum-restore 'on'             	# open last saved tmux on startup
set -g @plugin 'tmux-plugins/tmux-resurrect'	# persist tmux session
set -g @plugin 'tmux-plugins/tmux-continuum'	# continue tmux session


set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g status-right 'Continuum status: #{continuum_status}'

set -g @resurrect-strategy-vim 'session'  # save vim sessions (may require the tpope/vim-obsession plugin)
set -g @resurrect-strategy-nvim 'session'  # save neovim sessions (may require the tpope/vim-obsession plugin)
set -g @resurrect-capture-pane-contents 'on'  # save pane contents
set -g @continuum-restore 'on'  # restore session on tmux start
set -g @continuum-save-interval '5'  # save session every 5 minutes (default is 15)

# for vim
set -g @resurrect-strategy-vim 'session'
# for neovim
set -g @resurrect-strategy-nvim 'session'

set-option -g status-position top
set -g @plugin    'jimeh/tmux-themepack'
set -g @themepack 'powerline/block/cyan'
set -g @plugin    'sei40kr/tmux-airline-dracula'


set -g base-index 1           # start windows numbering at 1
set -g pane-base-index 1     # make pane numbering consistent with windows
set -g automatic-rename on   # rename window to reflect current program


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'

