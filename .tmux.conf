# List of plugins
set -g @plugin 'tmux-plugins/tpm'	   	# tmux package manager Prefix+I or Prefix+U	
set -g @plugin 'tmux-plugins/tmux-sensible'	# default tmux settings
set -g @plugin 'tmux-plugins/tmux-yank'    	# copying contents inside tmux
set -g @plugin 'tmux-plugins/tmux-copycat' 	# regex search highlighting
set -g @continuum-restore 'on'             	# open last saved tmux on startup
#set -g @plugin 'tmux-plugins/tmux-resurrect'	# persist tmux session
#set -g @plugin 'tmux-plugins/tmux-continuum'	# continue tmux session

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'

set -g default-terminal "screen-256color"
set-option -g status-position top

set -g @plugin    'jimeh/tmux-themepack'
#set -g @themepack 'powerline/block/cyan'
set -g @plugin    'sei40kr/tmux-airline-dracula'

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows
setw -g automatic-rename on   # rename window to reflect current program

